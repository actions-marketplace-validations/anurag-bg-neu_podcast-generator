name: "Podcast Generator by Anurag"
author: "Anurag BG"
description: "Generates a feed for a podcast from YAML file"
runs:
  using: "docker"
  image: "Dockerfile"
branding:
  icon: "git-branch"
  color: "red"
inputs:
  email:
    description: The computer's email address
    required: true
    default: ${{ github.actor }}@localhost
  name: 
    description: The committer's name
    required: true
    default: ${{ github.actor }}
